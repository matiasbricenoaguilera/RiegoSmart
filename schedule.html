<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horarios | Riego Smart</title>
    <script src="auth.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root {
            --bg-color: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --text-main: #f8fafc; --text-muted: #94a3b8;
            --accent: #3b82f6; --success: #10b981; --danger: #ef4444;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-color); color: var(--text-main); min-height: 100vh; }
        header { padding: 2rem; text-align: center; background: linear-gradient(to right, #1e293b, var(--bg-color)); border-bottom: 1px solid rgba(255,255,255,0.1); }
        h1 { font-weight: 800; font-size: 2.5rem; background: -webkit-linear-gradient(#60a5fa, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        nav { display: flex; justify-content: center; gap: 1rem; margin-top: 1rem; }
        a.btn-nav { text-decoration: none; padding: 0.5rem 1.5rem; background: var(--card-bg); color: var(--text-main); border-radius: 999px; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
        a.btn-nav:hover, a.btn-nav.active { background: var(--accent); border-color: var(--accent); }
        .container { max-width: 800px; margin: 3rem auto; padding: 0 1rem; }
        .schedule-item { background: var(--card-bg); padding: 1.5rem; border-radius: 12px; margin-bottom: 1rem; display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; border: 1px solid rgba(255,255,255,0.1); }
        .schedule-info h3 { margin-bottom: 0.5rem; font-size: 1.25rem; }
        .form-group { display: flex; gap: 1rem; align-items: center; flex-wrap: wrap; margin-top: 0.5rem; }
        label { color: var(--text-muted); font-size: 0.9rem; }
        input, select { background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 0.5rem; border-radius: 6px; }
        input[type="time"]::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .btn-save { background: var(--success); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .btn-save:hover { background: #059669; }
        #toast { position: fixed; bottom: 20px; right: 20px; background: var(--success); color: white; padding: 1rem 2rem; border-radius: 8px; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .clock-container { position: absolute; top: 1.5rem; right: 1.5rem; background: var(--card-bg); padding: 0.5rem 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: right; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); backdrop-filter: blur(10px); z-index: 10; }
        .clock-ntp { color: var(--accent); font-weight: 800; font-size: 1.2rem; display: flex; align-items: center; justify-content: flex-end; gap: 5px; }
        .clock-rtc { color: var(--text-muted); font-size: 0.8rem; margin-top: 2px; }
        .program-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 2rem; }
        .prog-btn { background: #334155; border: 1px solid rgba(255,255,255,0.1); color: white; padding: 10px 20px; border-radius: 12px; cursor: pointer; font-weight: 600; }
        .prog-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }
        .prog-btn.current { border: 2px solid var(--success); }
        .current-badge { color: var(--success); font-weight: bold; font-size: 0.8rem; display: block; margin-top: 5px; }
        @media (max-width: 600px) { .clock-container { position: relative; top: 0; right: 0; margin: 0 auto 1rem; text-align: center; display: inline-block; } }
        
        .config-ip { margin-top: 20px; font-size: 0.9rem; color: #fff; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; display: inline-block; }
        .config-ip input { background: transparent; border: 1px solid var(--accent); color: white; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <header>
        <div class="clock-container">
            <div class="clock-ntp">🌐 <span id="ntpTime">--:--:--</span></div>
            <div class="clock-rtc">⏱ RTC: <span id="rtcTime">--:--:--</span></div>
        </div>
        <h1>⏳ Programación de Riego</h1>
        <nav>
            <a href="index.html" class="btn-nav">🕹️ Estado y Control</a>
            <a href="schedule.html" class="btn-nav active">⏱️ Programación</a>
            <a href="graficos.html" class="btn-nav">📈 Gráficos</a>
        </nav>
        
        <div class="config-ip">
            IP ESP32 Central: <input type="text" id="espIp" value="192.168.1.85" onchange="saveIP()">
        </div>
    </header>
    <div class="container">
        <div class="program-selector" id="programTabs">
            <button class="prog-btn active" onclick="selectProgTab(0)">Programa 1</button>
            <button class="prog-btn" onclick="selectProgTab(1)">Programa 2</button>
            <button class="prog-btn" onclick="selectProgTab(2)">Programa 3</button>
        </div>
        <div id="activeProgramHeader" style="text-align: center; margin-bottom: 2rem; display:none;">
            <button class="btn-save" style="background:#3b82f6" onclick="activateThisProg()">✅ Establecer como Programa Vigente</button>
        </div>
        <div id="formsContainer">
            <p>Cargando programación...</p>
        </div>
    </div>
    <div id="toast">✔ Configuración actualizada</div>
    <div class="container" id="sensorsContainer" style="margin-top: 5rem;">
        <h2 style="text-align: center; margin-bottom: 2rem;">🧪 Calibración de Sensores</h2>
        <div id="sensorList"></div>
        <div class="schedule-item" style="background: rgba(16, 185, 129, 0.1); border-color: var(--success);">
            <div class="form-group" style="width:100%">
                <input type="text" id="newName" placeholder="Nombre Sensor (ej. Huerta)">
                <input type="number" id="newSID" placeholder="Estación ID" style="width:100px">
                <input type="number" id="newID" placeholder="Sensor ID" style="width:100px">
                <input type="number" id="newMin" placeholder="Mín (Mojado)" style="width:110px">
                <input type="number" id="newMax" placeholder="Máx (Seco)" style="width:110px">
                <button class="btn-save" onclick="addSensor()">➕ Añadir Sensor</button>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = 'https://ontyquiklrmebtzcvjyn.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9udHlxdWlrbHJtZWJ0emN2anluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzMzMjIsImV4cCI6MjA5MTE0OTMyMn0.rmbcm5s7HdAnljRnVHueq-qU6zgITizaBDVpqyI9-vs';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let editingProg = 0;
        let activeProg = 0;
        let systemState = { id: 1, active_program: 0, pumps: [] };

        function defaultProgram(idx) {
            return {
                startHour: 7, startMinute: idx * 5,
                flowRate: 2.0, area: 1.0,
                vwcThreshold: 30, assignedStationID: idx + 1,
                efficiency: 0.85, soilMaxMm: 50, Kc: 0.8
            };
        }

        function normalizeState(state) {
            const pumps = Array.isArray(state.pumps) ? state.pumps : [];
            while (pumps.length < 5) {
                pumps.push({ id: pumps.length, active: false, manual: false, programs: [defaultProgram(pumps.length), defaultProgram(pumps.length), defaultProgram(pumps.length)] });
            }
            pumps.forEach((p, idx) => {
                if (!Array.isArray(p.programs)) p.programs = [];
                while (p.programs.length < 3) p.programs.push(defaultProgram(idx));
            });
            state.pumps = pumps;
            if (typeof state.active_program !== 'number') state.active_program = 0;
            if (state.active_program < 0 || state.active_program > 2) state.active_program = 0;
            return state;
        }
        
        window.onload = async () => {
            document.getElementById('espIp').value = 'Modo nube (Supabase)';
            document.getElementById('espIp').disabled = true;
            await fetchSchedules();
            fetchTime();
            setInterval(fetchTime, 15000);
        };

        async function fetchSchedules() {
            try {
                const { data, error } = await supabaseClient
                    .from('system_state')
                    .select('id, active_program, pumps')
                    .eq('id', 1)
                    .single();
                if (error) throw error;
                systemState = normalizeState(data || { id: 1, active_program: 0, pumps: [] });
                activeProg = systemState.active_program;

                const pumpsForProgram = systemState.pumps.map((p, idx) => {
                    const cfg = p.programs[editingProg] || defaultProgram(idx);
                    return {
                        id: idx,
                        startHour: cfg.startHour, startMinute: cfg.startMinute,
                        flowRate: cfg.flowRate, area: cfg.area,
                        vwcThreshold: cfg.vwcThreshold, assignedStationID: cfg.assignedStationID,
                        efficiency: cfg.efficiency ?? 0.85,
                        soilMaxMm:  cfg.soilMaxMm  ?? 50,
                        Kc:         cfg.Kc         ?? 0.8
                    };
                });

                renderForms(pumpsForProgram);
                updateTabs();
                fetchSensors();
            } catch(e) {
                console.error(e);
                document.getElementById('formsContainer').innerHTML = '<p style="color:#ef4444">Error cargando programación desde Supabase.</p>';
            }
        }

        async function fetchSensors() {
            try {
                const { data, error } = await supabaseClient
                    .from('sensor_data')
                    .select('estacion, humedad, created_at')
                    .order('created_at', { ascending: false })
                    .limit(20);
                if (error) throw error;
                const list = document.getElementById('sensorList');
                list.innerHTML = '';
                const byStation = {};
                data.forEach(r => { if (!byStation[r.estacion]) byStation[r.estacion] = r; });
                Object.keys(byStation).sort((a,b)=>Number(a)-Number(b)).forEach((sid) => {
                    const s = byStation[sid];
                    list.innerHTML += `
                        <div class="schedule-item">
                            <div><strong>Estación ${sid}</strong></div>
                            <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:5px; margin:10px 0;">
                                <span style="color:var(--accent)">📊 Humedad actual: <b style="font-size:1.2rem">${s.humedad}%</b></span>
                                <br><small style="color:var(--text-muted)">Último update: ${new Date(s.created_at).toLocaleString()}</small>
                            </div>
                        </div>`;
                });
            } catch(e) { console.error(e); }
        }

        async function addSensor() { showToast("En modo nube, los sensores se gestionan en la central."); }
        async function removeSensor() { showToast("En modo nube, los sensores se gestionan en la central."); }

        function updateTabs() {
            document.querySelectorAll('.prog-btn').forEach((btn, i) => {
                btn.className = 'prog-btn' + (i === editingProg ? ' active' : '') + (i === activeProg ? ' current' : '');
                const oldBadge = btn.querySelector('.current-badge');
                if(oldBadge) oldBadge.remove();
                if(i === activeProg) btn.innerHTML += '<span class="current-badge">VIGENTE</span>';
            });
            document.getElementById('activeProgramHeader').style.display = (editingProg === activeProg) ? 'none' : 'block';
        }

        function selectProgTab(idx) { editingProg = idx; fetchSchedules(); }

        async function activateThisProg() {
            const { error } = await supabaseClient
                .from('system_state')
                .update({ active_program: editingProg })
                .eq('id', 1);
            if (!error) {
                activeProg = editingProg;
                showToast("Programa activado como vigente");
                updateTabs();
            }
        }

        function renderForms(pumps) {
            const container = document.getElementById('formsContainer');
            const zonas = [
                { nombre: 'Antejardín',   icono: '🌿', color: '#10b981' },
                { nombre: 'Huerta',       icono: '🥬', color: '#22c55e' },
                { nombre: 'Patio',        icono: '🪴', color: '#f59e0b' },
                { nombre: 'Entrada Auto', icono: '🚗', color: '#3b82f6' },
                { nombre: 'Macetas',      icono: '🪷', color: '#a855f7' },
            ];
            container.innerHTML = '';
            pumps.forEach((p, idx) => {
                const zona = zonas[idx] || { nombre: `Bomba ${idx+1}`, icono: '💧', color: '#64748b' };
                const hh = p.startHour.toString().padStart(2, '0');
                const mm = p.startMinute.toString().padStart(2, '0');
                const timeStr = `${hh}:${mm}`;
                container.innerHTML += `
                    <div class="schedule-item" style="border-left: 4px solid ${zona.color};">
                        <div class="schedule-info">
                            <h3>${zona.icono} Bomba ${idx + 1} — <span style="color:${zona.color}">${zona.nombre}</span></h3>
                            <small style="color:var(--text-muted)">Pin MOSFET ${idx + 1} | Programa ${editingProg + 1}</small>
                        </div>
                        <div class="form-group">
                            <div><label>Hora Inicio</label><br><input type="time" id="time_${idx}" value="${timeStr}"></div>
                            <div><label>Área (m²)</label><br><input type="number" id="area_${idx}" value="${p.area}" step="0.1" min="0.1"></div>
                            <div><label>Caudal (L/min)</label><br><input type="number" id="flow_${idx}" value="${p.flowRate}" step="0.1" min="0.1"></div>
                            <div><label>Umbral Humedad (%)</label><br><input type="number" id="thr_${idx}" value="${p.vwcThreshold}" step="1" min="0" max="100"></div>
                            <div><label>Sensor Maestro</label><br>
                                <select id="sensor_${idx}">
                                    <option value="1" ${p.assignedStationID==1 ? 'selected' : ''}>🌿 Estación 1 (Antejardín)</option>
                                    <option value="2" ${p.assignedStationID==2 ? 'selected' : ''}>🥬 Estación 2 (Huerta)</option>
                                    <option value="3" ${p.assignedStationID==3 ? 'selected' : ''}>🪴 Estación 3 (Patio)</option>
                                    <option value="4" ${p.assignedStationID==4 ? 'selected' : ''}>🚗 Estación 4 (Entrada)</option>
                                    <option value="5" ${p.assignedStationID==5 ? 'selected' : ''}>🪷 Estación 5 (Macetas)</option>
                                </select>
                            </div>
                        </div>
                        <!-- Parámetros agronómicos Nivel 2 -->
                        <details style="margin-top:10px; width:100%">
                            <summary style="cursor:pointer; color:var(--accent); font-size:0.85rem; user-select:none;">
                                🧪 Parámetros agronómicos (cálculo físico de duración)
                            </summary>
                            <div class="form-group" style="margin-top:8px; background:rgba(0,0,0,0.2); padding:10px; border-radius:8px;">
                                <div>
                                    <label>Eficiencia sistema</label>
                                    <small style="color:var(--text-muted); display:block;">goteo≈0.90 · aspersor≈0.75</small>
                                    <input type="number" id="eff_${idx}" value="${p.efficiency}" step="0.05" min="0.1" max="1.0" style="width:90px">
                                </div>
                                <div>
                                    <label>Cap. suelo (mm)</label>
                                    <small style="color:var(--text-muted); display:block;">agua disponible en perfil</small>
                                    <input type="number" id="soil_${idx}" value="${p.soilMaxMm}" step="5" min="5" max="300" style="width:90px">
                                </div>
                                <div>
                                    <label>Kc (coef. cultivo)</label>
                                    <small style="color:var(--text-muted); display:block;">suculenta≈0.3 · césped≈0.8 · tomate≈1.1</small>
                                    <input type="number" id="kc_${idx}" value="${p.Kc}" step="0.05" min="0.1" max="2.0" style="width:90px">
                                </div>
                            </div>
                        </details>
                    </div>
                `;
            });
            container.innerHTML += `<div style="text-align: right; margin-top: 1rem;"><button class="btn-save" onclick="saveAll()">💾 Guardar Configuración Programa ${editingProg + 1}</button></div>`;
        }
        async function saveAll() {
            let payload = [];
            for(let i=0; i<5; i++) {
                const timeVal = document.getElementById(`time_${i}`).value;
                const [h, m] = timeVal.split(':');
                const sid = document.getElementById(`sensor_${i}`).value;
                payload.push({
                    id: i,
                    startHour: parseInt(h, 10), startMinute: parseInt(m, 10),
                    flowRate: parseFloat(document.getElementById(`flow_${i}`).value),
                    area: parseFloat(document.getElementById(`area_${i}`).value),
                    vwcThreshold: parseFloat(document.getElementById(`thr_${i}`).value),
                    assignedStationID: parseInt(sid, 10),
                    efficiency: parseFloat(document.getElementById(`eff_${i}`).value  || 0.85),
                    soilMaxMm:  parseFloat(document.getElementById(`soil_${i}`).value || 50),
                    Kc:         parseFloat(document.getElementById(`kc_${i}`).value   || 0.8)
                });
            }
            const pumps = systemState.pumps || [];
            for (let i = 0; i < payload.length; i++) {
                if (!Array.isArray(pumps[i].programs)) pumps[i].programs = [defaultProgram(i), defaultProgram(i), defaultProgram(i)];
                pumps[i].programs[editingProg] = {
                    startHour: payload[i].startHour, startMinute: payload[i].startMinute,
                    flowRate: payload[i].flowRate, area: payload[i].area,
                    vwcThreshold: payload[i].vwcThreshold,
                    assignedStationID: payload[i].assignedStationID,
                    efficiency: payload[i].efficiency,
                    soilMaxMm:  payload[i].soilMaxMm,
                    Kc:         payload[i].Kc
                };
            }
            const { error } = await supabaseClient
                .from('system_state')
                .update({ pumps })
                .eq('id', 1);
            if(!error) showToast("Configuración guardada en nube");
        }
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = "✔ " + msg;
            t.style.opacity = 1;
            setTimeout(() => t.style.opacity = 0, 3000);
        }
        async function fetchTime() {
            const now = new Date();
            const hh = now.getHours().toString().padStart(2, '0');
            const mm = now.getMinutes().toString().padStart(2, '0');
            const ss = now.getSeconds().toString().padStart(2, '0');
            document.getElementById('ntpTime').innerText = `${hh}:${mm}:${ss}`;
            document.getElementById('rtcTime').innerText = 'CLOUD';
        }
    </script>
</body>
</html>
