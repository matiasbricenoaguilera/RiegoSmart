<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Riego Smart (Nube)</title>
    <script src="auth.js"></script>
    <!-- Supabase CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root {
            --bg-color: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --text-main: #f8fafc; --text-muted: #94a3b8;
            --accent: #3b82f6; --accent-hover: #2563eb; --success: #10b981; --danger: #ef4444; --warn: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-color); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
        header { padding: 2rem; text-align: center; background: linear-gradient(to right, #1e293b, var(--bg-color)); border-bottom: 1px solid rgba(255,255,255,0.1); }
        h1 { font-weight: 800; font-size: 2.5rem; background: -webkit-linear-gradient(#60a5fa, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        nav { display: flex; justify-content: center; gap: 1rem; margin-top: 1rem; }
        a.btn-nav { text-decoration: none; padding: 0.5rem 1.5rem; background: var(--card-bg); color: var(--text-main); border-radius: 999px; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; }
        a.btn-nav:hover, a.btn-nav.active { background: var(--accent); border-color: var(--accent); }
        .container { max-width: 1000px; margin: 3rem auto; padding: 0 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        .card { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 1.5rem; text-align: center; transition: transform 0.3s ease; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .pump-icon { width: 64px; height: 64px; margin: 0 auto 1rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: all 0.4s ease; border: 2px solid var(--text-muted); color: var(--text-muted); }
        .pump-icon.on { border-color: var(--success); color: var(--success); box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        .status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.875rem; font-weight: 600; text-transform: uppercase; margin-bottom: 1.5rem; }
        .status-off { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .status-on { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .toggle-btn { background: var(--accent); color: white; border: none; padding: 0.75rem 2rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; width: 100%; }
        .toggle-btn:hover { background: var(--accent-hover); }
        .toggle-btn.btn-danger { background: var(--danger); }
        .toggle-btn.btn-danger:hover { background: #dc2626; }
        .cloud-badge { background: var(--accent); padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; vertical-align: top; margin-left: 10px; }
        .clock-container { position: absolute; top: 1.5rem; right: 1.5rem; background: var(--card-bg); padding: 0.5rem 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: right; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); backdrop-filter: blur(10px); z-index: 10; }
        @media (max-width: 600px) { .clock-container { position: relative; top: 0; right: 0; margin: 0 auto 1rem; text-align: center; display: inline-block; } }
    </style>
</head>
<body>
    <header>
        <div class="clock-container" style="font-size:0.9rem">
            <span style="color:var(--success)">Sincronizado vía Nube ☁️</span><br>
            <small id="lastRefresh">Última act: --:--:--</small>
        </div>
        <h1>💧 Riego Smart <span class="cloud-badge">Supabase</span></h1>
        <nav>
            <a href="index.html" class="btn-nav active">🕹️ Estado y Control</a>
            <a href="schedule.html" class="btn-nav">⏱️ Programación</a>
            <a href="graficos.html" class="btn-nav">📈 Gráficos</a>
        </nav>
    </header>
    <div class="container">
        <div style="text-align: center; margin-bottom: 2rem;">
            <p style="color:var(--text-muted)">Programa Activo: <strong id="activeProgName" style="color:var(--accent)">--</strong></p>
        </div>
        <div class="grid" id="pumpGrid">
            <p>Conectando a Supabase...</p>
        </div>
    </div>
    
    <script>
        const SUPABASE_URL = 'https://ontyquiklrmebtzcvjyn.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9udHlxdWlrbHJtZWJ0emN2anluIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1NzMzMjIsImV4cCI6MjA5MTE0OTMyMn0.rmbcm5s7HdAnljRnVHueq-qU6zgITizaBDVpqyI9-vs';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        window.onload = () => {
            fetchState();
            setInterval(fetchState, 4000); 
        };

        let pendingCommands = {}; // {pumpId: {time, expectedActive}}
        let lastPumps = [];
        let lastDecisions = [];

        async function fetchState() {
            try {
                const { data, error } = await supabaseClient
                    .from('system_state')
                    .select('*')
                    .eq('id', 1)
                    .single();

                if (error) throw error;
                lastPumps = data.pumps || [];
                lastDecisions = data.decisions || [];

                // Limpiar pending si Supabase ya refleja el estado activo esperado
                if (data.pumps) {
                    data.pumps.forEach((p, i) => {
                        if (pendingCommands[i]) {
                            if (p.active === pendingCommands[i].expectedActive) {
                                delete pendingCommands[i]; // ESP32 confirmó el cambio
                            } else if (Date.now() - pendingCommands[i].time > 30000) {
                                delete pendingCommands[i]; // Timeout de seguridad 30s
                            }
                        }
                    });
                }

                renderPumps(lastPumps, lastDecisions);
                document.getElementById('activeProgName').innerText = "Programa " + ((data.active_program || 0) + 1);
                
                let now = new Date();
                document.getElementById('lastRefresh').innerText = "Última act: " + now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0') + ":" + now.getSeconds().toString().padStart(2, '0');
            } catch(e) { console.error("Error buscando estado en Supabase", e); }
        }

        async function togglePump(id, turnOn, btnElement) {
            btnElement.innerText = '⏳ Enviando...';
            btnElement.style.opacity = '0.6';
            btnElement.disabled = true;
            pendingCommands[id] = { time: Date.now(), expectedActive: turnOn };
            // Reflejar el estado pendiente de inmediato, sin esperar próximo polling.
            renderPumps(lastPumps, lastDecisions);
            
            try {
                const { error } = await supabaseClient
                    .from('remote_commands')
                    .insert([{ pump_id: id, target_state: turnOn }]);

                if (error) throw error;
            } catch (e) {
                console.error("Error enviando comando a Supabase", e);
                alert("Error al enviar comando.");
                delete pendingCommands[id];
            }
        }

        // Contadores locales para el tiempo restante (se actualizan entre polls de Supabase)
        let countdowns = {}; // { pumpIndex: { remaining_s, total_s, ts } }

        function startCountdown(index, remaining_s, total_s) {
            countdowns[index] = { remaining_s, total_s, ts: Date.now() };
        }
        function clearCountdown(index) { delete countdowns[index]; }

        function getCountdownRemaining(index) {
            const c = countdowns[index];
            if (!c) return 0;
            const elapsed = (Date.now() - c.ts) / 1000;
            return Math.max(0, c.remaining_s - elapsed);
        }

        function fmtTime(seconds) {
            const m = Math.floor(seconds / 60);
            const s = Math.floor(seconds % 60);
            return `${m}:${s.toString().padStart(2,'0')}`;
        }
        function fmtMins(mins) {
            if (mins < 60)  return `${mins} min`;
            const h = Math.floor(mins / 60), m = mins % 60;
            return m ? `${h}h ${m}min` : `${h}h`;
        }

        function renderPumps(pumpData, decisions) {
            if(!pumpData || !decisions) return;
            const grid = document.getElementById('pumpGrid');
            grid.innerHTML = '';
            pumpData.forEach((state, index) => {
                const isOn    = state.active;
                const manual  = state.manual;
                const d       = decisions[index] || {};
                const isPending = !!pendingCommands[index];

                // Sincronizar countdown con datos frescos del servidor
                if (isOn && state.remaining_s > 0) {
                    startCountdown(index, state.remaining_s, state.total_s || 0);
                } else if (!isOn) {
                    clearCountdown(index);
                }

                // --- Humedad y umbral ---
                const hum = d.hum != null ? d.hum : '--';
                const thr = d.thr != null ? d.thr : '--';
                const humPct = typeof hum === 'number' ? hum : 0;
                const thrPct = typeof thr === 'number' ? thr : 100;
                const humColor = humPct >= thrPct ? '#10b981' : humPct >= thrPct * 0.6 ? '#f59e0b' : '#ef4444';
                const humBarWidth = Math.min(100, Math.round(humPct));
                const thrBarPos  = Math.min(100, Math.round(thrPct));

                // --- Próximo riego ---
                const schedHHMM   = d.sched_hhmm   || '--:--';
                const minsToSched = d.mins_to_sched != null ? d.mins_to_sched : null;
                let schedLine = '';
                if (minsToSched != null) {
                    if (minsToSched === 0) {
                        schedLine = `<span style="color:var(--warn)">⚡ Evaluando ahora...</span>`;
                    } else if (minsToSched <= 60) {
                        schedLine = `<span style="color:var(--warn)">🕐 ${schedHHMM} <small>(en ${fmtMins(minsToSched)})</small></span>`;
                    } else {
                        schedLine = `<span style="color:var(--text-muted)">🕐 ${schedHHMM} <small>(en ${fmtMins(minsToSched)})</small></span>`;
                    }
                }

                // --- Timer de riego activo ---
                let timerHtml = '';
                if (isOn) {
                    const rem  = getCountdownRemaining(index);
                    const tot  = countdowns[index] ? countdowns[index].total_s : 0;
                    const prog = tot > 0 ? Math.max(0, Math.min(100, Math.round((rem / tot) * 100))) : 0;
                    timerHtml = `
                        <div style="margin:8px 0; background:rgba(16,185,129,0.1); border-radius:8px; padding:8px; border:1px solid rgba(16,185,129,0.3);">
                            <div style="font-size:0.8rem; color:var(--success); margin-bottom:4px;">⏱ Tiempo restante</div>
                            <div style="font-size:1.4rem; font-weight:700; color:var(--success); font-variant-numeric:tabular-nums;" id="timer_${index}">${fmtTime(rem)}</div>
                            <div style="background:rgba(255,255,255,0.1); border-radius:4px; height:5px; margin-top:6px;">
                                <div style="background:var(--success); border-radius:4px; height:5px; width:${prog}%; transition:width 1s linear;" id="timerBar_${index}"></div>
                            </div>
                        </div>`;
                }

                // --- Botón ---
                let btnHtml;
                if (isPending) {
                    const timedOut = Date.now() - pendingCommands[index].time > 15000;
                    btnHtml = timedOut
                        ? `<button class="toggle-btn btn-danger" onclick="retryPending(${index}, this)">⚠ Sin confirmación (reintentar)</button>`
                        : `<button class="toggle-btn" disabled style="opacity:0.6;cursor:wait;background:#f59e0b">⏳ Esperando confirmación...</button>`;
                } else if (isOn) {
                    btnHtml = `<button class="toggle-btn btn-danger" onclick="togglePump(${index}, false, this)">🔴 APAGAR</button>`;
                } else {
                    btnHtml = `<button class="toggle-btn" onclick="togglePump(${index}, true, this)">🟢 ENCENDER</button>`;
                }

                grid.innerHTML += `
                    <div class="card">
                        <div class="pump-icon ${isOn ? 'on' : ''}">💦</div>
                        <h2>Bomba ${index + 1}</h2>
                        <div class="status-badge ${isOn ? 'status-on' : 'status-off'}">${isOn ? 'REGANDO' : 'APAGADA'}</div>

                        ${timerHtml}

                        <!-- Humedad vs Umbral -->
                        <div style="background:rgba(0,0,0,0.2); border-radius:8px; padding:10px; margin-bottom:10px; text-align:left; font-size:0.82rem;">
                            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                                <strong style="color:var(--accent)">💧 Humedad del suelo</strong>
                                <span style="color:${humColor}; font-weight:700;">${hum}%</span>
                            </div>
                            <!-- Barra de humedad con marcador de umbral -->
                            <div style="position:relative; background:rgba(255,255,255,0.1); border-radius:4px; height:8px; margin-bottom:6px;">
                                <div style="background:${humColor}; border-radius:4px; height:8px; width:${humBarWidth}%; transition:width 0.5s;"></div>
                                <div style="position:absolute; top:-3px; left:${thrBarPos}%; transform:translateX(-50%); width:2px; height:14px; background:#f59e0b; border-radius:1px;" title="Umbral: ${thr}%"></div>
                            </div>
                            <div style="display:flex; justify-content:space-between; color:var(--text-muted); font-size:0.75rem;">
                                <span>0%</span>
                                <span style="color:#f59e0b;">Umbral: ${thr}%</span>
                                <span>100%</span>
                            </div>
                        </div>

                        <!-- Estado y próximo riego -->
                        <div style="background:rgba(0,0,0,0.2); border-radius:8px; padding:10px; margin-bottom:10px; text-align:left; font-size:0.82rem;">
                            <div style="margin-bottom:4px;">
                                <strong style="color:var(--accent)">🧠 Estado:</strong>
                                <span style="color:#fff; margin-left:4px;">${d.result || 'Sincronizando...'}</span>
                            </div>
                            <div style="color:var(--text-muted); margin-bottom:4px;">
                                <strong>Decisión:</strong> ${d.reason || '—'}
                                ${d.min ? `<span style="color:var(--warn)"> · ${d.min} min programados</span>` : ''}
                            </div>
                            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.08); margin:6px 0;">
                            <div><strong style="color:var(--accent)">📅 Próximo riego:</strong></div>
                            <div style="margin-top:2px;">${schedLine || '<span style="color:var(--text-muted)">Sin datos</span>'}</div>
                        </div>

                        <p style="color:var(--text-muted); margin-bottom:0.75rem; font-size:0.82rem;">
                            Modo: ${manual ? '🔴 MANUAL FORZADO' : '🟢 AUTOMÁTICO'}
                        </p>
                        ${btnHtml}
                    </div>
                `;
            });

            // Iniciar timers locales para contar regresivamente entre polls
            startLocalTimers();
        }

        function startLocalTimers() {
            clearInterval(window._localTimerInterval);
            window._localTimerInterval = setInterval(() => {
                Object.keys(countdowns).forEach(idx => {
                    const rem  = getCountdownRemaining(idx);
                    const tot  = countdowns[idx].total_s;
                    const tEl  = document.getElementById('timer_' + idx);
                    const bEl  = document.getElementById('timerBar_' + idx);
                    if (tEl) tEl.innerText = fmtTime(rem);
                    if (bEl) bEl.style.width = (tot > 0 ? Math.max(0, Math.round((rem / tot) * 100)) : 0) + '%';
                    if (rem <= 0) clearCountdown(idx);
                });
            }, 1000);
        }

        function retryPending(id, btnElement) {
            const pending = pendingCommands[id];
            if (!pending) return;
            delete pendingCommands[id];
            togglePump(id, !!pending.expectedActive, btnElement);
        }
    </script>
</body>
</html>
