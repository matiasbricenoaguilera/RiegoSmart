<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | Riego Smart</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        :root {
            --bg-color: #0f172a; --card-bg: rgba(30, 41, 59, 0.7); --text-main: #f8fafc; --text-muted: #94a3b8;
            --accent: #3b82f6; --accent-hover: #2563eb; --success: #10b981; --danger: #ef4444; --warn: #f59e0b;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-color); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }
        header { padding: 2rem; text-align: center; background: linear-gradient(to right, #1e293b, var(--bg-color)); border-bottom: 1px solid rgba(255,255,255,0.1); }
        h1 { font-weight: 800; font-size: 2.5rem; background: -webkit-linear-gradient(#60a5fa, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        nav { display: flex; justify-content: center; gap: 1rem; margin-top: 1rem; }
        a.btn-nav { text-decoration: none; padding: 0.5rem 1.5rem; background: var(--card-bg); color: var(--text-main); border-radius: 999px; border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s ease; }
        a.btn-nav:hover, a.btn-nav.active { background: var(--accent); border-color: var(--accent); }
        .container { max-width: 1000px; margin: 3rem auto; padding: 0 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 1.5rem; }
        .card { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 16px; padding: 1.5rem; text-align: center; transition: transform 0.3s ease; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .pump-icon { width: 64px; height: 64px; margin: 0 auto 1rem; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; transition: all 0.4s ease; border: 2px solid var(--text-muted); color: var(--text-muted); }
        .pump-icon.on { border-color: var(--success); color: var(--success); box-shadow: 0 0 20px rgba(16, 185, 129, 0.4); }
        .status-badge { display: inline-block; padding: 0.25rem 0.75rem; border-radius: 999px; font-size: 0.875rem; font-weight: 600; text-transform: uppercase; margin-bottom: 1.5rem; }
        .status-off { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        .status-on { background: rgba(16, 185, 129, 0.2); color: var(--success); }
        .toggle-btn { background: var(--accent); color: white; border: none; padding: 0.75rem 2rem; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; width: 100%; }
        .toggle-btn:hover { background: var(--accent-hover); }
        .toggle-btn.btn-danger { background: var(--danger); }
        .toggle-btn.btn-danger:hover { background: #dc2626; }
        .clock-container { position: absolute; top: 1.5rem; right: 1.5rem; background: var(--card-bg); padding: 0.5rem 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); text-align: right; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); backdrop-filter: blur(10px); z-index: 10; }
        .clock-ntp { color: var(--accent); font-weight: 800; font-size: 1.2rem; display: flex; align-items: center; justify-content: flex-end; gap: 5px; }
        .clock-rtc { color: var(--text-muted); font-size: 0.8rem; margin-top: 2px; }
        .clock-set { margin-top: 8px; font-size: 0.75rem; border: 1px solid rgba(255,255,255,0.2); padding: 5px; border-radius: 4px; display: flex; gap: 5px; }
        .clock-set input { background: transparent; border: none; color: white; width: 100px; font-size: 0.75rem; }
        .clock-set button { background: var(--accent); border: none; color: white; padding: 2px 5px; border-radius: 3px; cursor: pointer; }
        @media (max-width: 600px) { .clock-container { position: relative; top: 0; right: 0; margin: 0 auto 1rem; text-align: center; display: inline-block; } }
        
        .config-ip { margin-top: 20px; font-size: 0.9rem; color: #fff; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; display: inline-block; }
        .config-ip input { background: transparent; border: 1px solid var(--accent); color: white; padding: 5px; border-radius: 5px; }
    </style>
</head>
<body>
    <header>
        <div class="clock-container">
            <div class="clock-ntp">🌐 <span id="ntpTime">--:--:--</span></div>
            <div class="clock-rtc">⏱ RTC: <span id="rtcTime">--:--:--</span></div>
            <div class="clock-set">
                <input type="datetime-local" id="manualDate">
                <button onclick="setRtc()">Ajustar</button>
            </div>
        </div>
        <h1>💧 Riego Smart</h1>
        <nav>
            <a href="index.html" class="btn-nav active">🕹️ Estado y Control</a>
            <a href="schedule.html" class="btn-nav">⏱️ Programación</a>
        </nav>
        
        <div class="config-ip">
            IP ESP32 Central: <input type="text" id="espIp" value="192.168.1.85" onchange="saveIP()"> 
            <small>(Asegúrate de estar en el mismo Wi-Fi)</small>
        </div>
    </header>
    <div class="container">
        <div style="text-align: center; margin-bottom: 2rem;">
            <p style="color:var(--text-muted)">Programa Activo: <strong id="activeProgName" style="color:var(--accent)">--</strong></p>
        </div>
        <div class="grid" id="pumpGrid">
            <p>Cargando estado...</p>
        </div>
    </div>
    
    <script>
        let baseUrl = "http://192.168.1.85";
        
        function saveIP() {
            baseUrl = "http://" + document.getElementById('espIp').value;
            localStorage.setItem('espIp', document.getElementById('espIp').value);
            fetchState();
        }
        
        window.onload = () => {
            if(localStorage.getItem('espIp')) {
                document.getElementById('espIp').value = localStorage.getItem('espIp');
                baseUrl = "http://" + localStorage.getItem('espIp');
            }
            fetchState();
            fetchTime();
            setInterval(fetchState, 3000); 
            setInterval(fetchTime, 10000); 
        };

        async function fetchState() {
            try {
                const res = await fetch(`${baseUrl}/api/state`);
                const data = await res.json();
                renderPumps(data.pumps, data.decisions);
                document.getElementById('activeProgName').innerText = "Programa " + (data.active + 1);
            } catch(e) { console.error("Error buscando estado", e); }
        }

        async function setRtc() {
            const val = document.getElementById('manualDate').value;
            if(!val) return alert("Selecciona una fecha y hora");
            await fetch(`${baseUrl}/api/time/set?val=${val}`);
            fetchTime();
        }

        async function togglePump(id, turnOn) {
            await fetch(`${baseUrl}/api/toggle?id=${id}&state=${turnOn?1:0}`);
            fetchState();
        }

        function renderPumps(pumpData, decisions) {
            const grid = document.getElementById('pumpGrid');
            grid.innerHTML = '';
            pumpData.forEach((state, index) => {
                const isOn = state.active;
                const manual = state.manual;
                const d = decisions[index];
                
                grid.innerHTML += `
                    <div class="card">
                        <div class="pump-icon ${isOn ? 'on' : ''}">💦</div>
                        <h2>Bomba ${index + 1}</h2>
                        <div class="status-badge ${isOn ? 'status-on' : 'status-off'}">${isOn ? 'ENCENDIDA' : 'APAGADA'}</div>
                        
                        <div style="background:rgba(0,0,0,0.2); border-radius:8px; padding:10px; margin-bottom:15px; font-size:0.8rem; text-align:left;">
                            <strong style="color:var(--accent)">🧠 Motor de Decisión:</strong><br>
                            <span style="color:#fff">Humedad: ${d.hum}% <small>(${d.source})</small></span><br>
                            <span style="color:#fff">Necesidad: ${d.mm} mm</span><br>
                            <span style="color:var(--warn)">Tiempo: ${d.min} min</span><br>
                            <small style="color:var(--text-muted)">Estado: ${d.reason}</small><br>
                            <hr style="border:0; border-top:1px solid rgba(255,255,255,0.1); margin:5px 0;">
                            <strong style="color:var(--success)">📊 Último Riego:</strong><br>
                            <small style="color:#fff">${d.result || 'Sin datos'}</small>
                        </div>

                        <p style="color:var(--text-muted); margin-bottom: 1rem; font-size: 0.85rem;">
                            Modo: ${manual ? 'MANUAL FORZADO' : 'AUTOMÁTICO'}
                        </p>
                        <button class="toggle-btn ${isOn && manual ? 'btn-danger' : ''}" onclick="togglePump(${index}, ${!(isOn && manual)})">
                            ${isOn && manual ? 'Quitar Manual (Auto)' : 'Forzar Encendido'}
                        </button>
                    </div>
                `;
            });
        }
        
        async function fetchTime() {
            try {
                const res = await fetch(`${baseUrl}/api/time`);
                const data = await res.json();
                document.getElementById('ntpTime').innerText = data.ntp;
                document.getElementById('rtcTime').innerText = data.rtc;
            } catch(e) {}
        }
    </script>
</body>
</html>
